# Single-file nginx config for the AnveGuard self-host dashboard.
# Reverse-proxies /functions/v1/* to the Supabase edge runtime so the
# dashboard's call to /functions/v1/dashboard works without CORS.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — the dashboard is client-side routed (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Functions proxy.
    location /functions/v1/ {
        proxy_pass         http://edge-runtime:8081/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_buffering    off;
        proxy_read_timeout 600s;
    }
}
